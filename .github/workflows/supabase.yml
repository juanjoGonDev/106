name: Deploy Supabase backend safely

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
      - 'scripts/check-production-migrations.mjs'
      - 'scripts/check-snapshot-db.mjs'
      - 'scripts/build-allowed-origins.mjs'
      - 'scripts/capture-production-snapshot.sh'
      - 'scripts/compare-production-snapshots.mjs'
      - 'scripts/record-deployment-snapshot.sql'
      - '.github/workflows/supabase.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-production
  cancel-in-progress: false

env:
  NODE_VERSION: 22.13.0
  SUPABASE_CLI_VERSION: 2.101.0

jobs:
  deploy:
    name: 🚀 Supabase · Production deployment
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
      HASH_PEPPER: ${{ secrets.HASH_PEPPER }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
      ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
      PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
      GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

    steps:
      - name: Checkout full history
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Set up pinned Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo 'Missing SUPABASE_ACCESS_TOKEN secret' && exit 1)
          test -n "$SUPABASE_DB_PASSWORD" || (echo 'Missing SUPABASE_DB_PASSWORD secret' && exit 1)
          test -n "$PROJECT_ID" || (echo 'Missing SUPABASE_PROJECT_ID variable' && exit 1)
          test -n "$HASH_PEPPER" || (echo 'Missing HASH_PEPPER secret' && exit 1)

          canonical_origins="$(node scripts/build-allowed-origins.mjs)"
          pages_origin="https://${GITHUB_REPOSITORY_OWNER,,}.github.io"
          test -n "$canonical_origins" || (echo 'No valid CORS origins were generated' && exit 1)
          case ",$canonical_origins," in
            *",$pages_origin,"*) ;;
            *) echo "Generated CORS allowlist is missing $pages_origin" && exit 1 ;;
          esac

          if [[ "${ALLOWED_ORIGINS:-}" == *'*'* ]]; then
            echo '::warning::ALLOWED_ORIGINS contains a wildcard. It is ignored and will not be deployed.'
          fi

      - name: Guard against destructive migrations
        shell: bash
        env:
          EVENT_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          base="$EVENT_BEFORE"
          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
            base="$(git rev-parse HEAD^ 2>/dev/null || true)"
          fi
          MIGRATION_DIFF_BASE="$base" MIGRATION_DIFF_HEAD="HEAD" node scripts/check-production-migrations.mjs

      - name: Install pinned Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Repair production CORS allowlist
        shell: bash
        run: |
          set -euo pipefail
          canonical_origins="$(node scripts/build-allowed-origins.mjs)"
          supabase secrets set "ALLOWED_ORIGINS=$canonical_origins" --project-ref "$PROJECT_ID"

      - name: Link production project
        run: supabase link --project-ref "$PROJECT_ID"

      - name: Preview pending migrations
        run: supabase db push --linked --dry-run

      - name: Probe snapshot database connectivity
        id: snapshot_database
        shell: bash
        run: node scripts/check-snapshot-db.mjs >> "$GITHUB_OUTPUT"

      - name: Report snapshot safety mode
        if: always()
        shell: bash
        env:
          SNAPSHOT_ENABLED: ${{ steps.snapshot_database.outputs.enabled }}
          SNAPSHOT_REASON: ${{ steps.snapshot_database.outputs.reason }}
          SNAPSHOT_DIRECT: ${{ steps.snapshot_database.outputs.direct }}
        run: |
          set -euo pipefail
          if [ "$SNAPSHOT_ENABLED" = 'true' ]; then
            {
              echo '### Supabase integrity snapshot mode'
              echo ''
              echo '✅ Direct pre/post deployment snapshots are enabled.'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo '### Supabase integrity snapshot mode'
            echo ''
            echo "⚠️ Direct snapshots are disabled for this run: ${SNAPSHOT_REASON:-probe-failed}."
            echo ''
            echo 'Migration guards, linked dry-run, incremental migrations and Edge Function deployment remain enabled.'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$SNAPSHOT_DIRECT" = 'true' ]; then
            echo '::warning::Replace the direct db.<project>.supabase.co URL with the Supabase Session pooler URI on port 5432 to restore snapshots on GitHub-hosted runners.'
          fi

      - name: Capture pre-deployment history counters
        if: ${{ steps.snapshot_database.outputs.enabled == 'true' }}
        shell: bash
        run: bash scripts/capture-production-snapshot.sh deployment/pre-deploy.json

      - name: Record pre-deployment reference when available
        if: ${{ steps.snapshot_database.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          exists="$(psql "$SUPABASE_DB_URL" --no-psqlrc --tuples-only --no-align --set ON_ERROR_STOP=1 --command "select to_regclass('public.game_deployment_snapshots') is not null;" | tr -d '\r\n')"
          if [ "$exists" = "t" ]; then
            psql "$SUPABASE_DB_URL" --no-psqlrc --set ON_ERROR_STOP=1 \
              --set=commit_sha="$GITHUB_SHA" --set=run_id="$GITHUB_RUN_ID" --set=phase="pre" \
              -f scripts/record-deployment-snapshot.sql
          else
            echo 'Deployment snapshot table is not installed yet; the pre-deployment JSON artifact remains available.'
          fi

      - name: Apply additive database migrations
        run: supabase db push --linked --yes

      - name: Set Edge Function secrets
        shell: bash
        run: |
          set -euo pipefail
          canonical_origins="$(node scripts/build-allowed-origins.mjs)"
          test -n "$canonical_origins" || (echo 'No valid CORS origins were generated' && exit 1)

          secrets=(
            "HASH_PEPPER=$HASH_PEPPER"
            "ALLOWED_ORIGINS=$canonical_origins"
          )
          if [ -n "$TURNSTILE_SECRET_KEY" ]; then
            secrets+=("TURNSTILE_SECRET_KEY=$TURNSTILE_SECRET_KEY")
          fi
          supabase secrets set "${secrets[@]}" --project-ref "$PROJECT_ID"

      - name: Deploy Edge Function
        run: supabase functions deploy game-api --project-ref "$PROJECT_ID"

      - name: Capture post-deployment history counters
        if: ${{ steps.snapshot_database.outputs.enabled == 'true' }}
        shell: bash
        run: bash scripts/capture-production-snapshot.sh deployment/post-deploy.json

      - name: Verify historical data was preserved
        if: ${{ steps.snapshot_database.outputs.enabled == 'true' }}
        run: node scripts/compare-production-snapshots.mjs deployment/pre-deploy.json deployment/post-deploy.json

      - name: Record post-deployment reference in Supabase
        if: ${{ steps.snapshot_database.outputs.enabled == 'true' }}
        shell: bash
        run: |
          psql "$SUPABASE_DB_URL" --no-psqlrc --set ON_ERROR_STOP=1 \
            --set=commit_sha="$GITHUB_SHA" --set=run_id="$GITHUB_RUN_ID" --set=phase="post" \
            -f scripts/record-deployment-snapshot.sql

      - name: Upload non-sensitive integrity report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: production-integrity-${{ github.run_id }}
          path: deployment/*.json
          if-no-files-found: ignore
          retention-days: 90
