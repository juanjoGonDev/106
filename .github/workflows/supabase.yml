name: Deploy Supabase backend

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
      HASH_PEPPER: ${{ secrets.HASH_PEPPER }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
      ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Validate deployment configuration
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo 'Missing SUPABASE_ACCESS_TOKEN secret' && exit 1)
          test -n "$SUPABASE_DB_PASSWORD" || (echo 'Missing SUPABASE_DB_PASSWORD secret' && exit 1)
          test -n "$PROJECT_ID" || (echo 'Missing SUPABASE_PROJECT_ID variable' && exit 1)
          test -n "$HASH_PEPPER" || (echo 'Missing HASH_PEPPER secret' && exit 1)
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest
          github-token: ${{ github.token }}
      - name: Link project
        run: supabase link --project-ref "$PROJECT_ID"
      - name: Apply database migrations
        run: supabase db push
      - name: Set Edge Function secrets
        shell: bash
        run: |
          secrets=("HASH_PEPPER=$HASH_PEPPER")
          if [ -n "$TURNSTILE_SECRET_KEY" ]; then secrets+=("TURNSTILE_SECRET_KEY=$TURNSTILE_SECRET_KEY"); fi
          if [ -n "$ALLOWED_ORIGINS" ]; then secrets+=("ALLOWED_ORIGINS=$ALLOWED_ORIGINS"); fi
          supabase secrets set "${secrets[@]}" --project-ref "$PROJECT_ID"
      - name: Deploy Edge Function
        run: supabase functions deploy game-api --project-ref "$PROJECT_ID"
