name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  NODE_VERSION: 22.13.0

jobs:
  prepare:
    name: 🏗️ Pages · Prepare public site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      build_type: ${{ steps.pages-mode.outputs.build_type }}
    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pinned Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Detect GitHub Pages publishing mode
        id: pages-mode
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pages_json="$(gh api "repos/${GITHUB_REPOSITORY}/pages")"
          build_type="$(jq -r '.build_type // "legacy"' <<<"$pages_json")"
          site_url="$(jq -r '.html_url // empty' <<<"$pages_json")"
          test "$build_type" = "legacy" || test "$build_type" = "workflow"
          test -n "$site_url"
          echo "build_type=$build_type" >> "$GITHUB_OUTPUT"
          echo "site_url=$site_url" >> "$GITHUB_OUTPUT"
          echo "Detected Pages mode: $build_type ($site_url)"

      - name: Wait for compatible readiness backend
        shell: bash
        env:
          SUPABASE_FUNCTIONS_URL: ${{ vars.SUPABASE_FUNCTIONS_URL }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          functions_url="${SUPABASE_FUNCTIONS_URL%/}"
          test -n "$functions_url" || (echo 'Missing SUPABASE_FUNCTIONS_URL variable' && exit 1)

          if [[ "$functions_url" == */functions/v1 ]]; then
            readiness_url="$functions_url/game-ready-api"
          else
            readiness_url="${functions_url%/*}/game-ready-api"
          fi
          origin="https://${GITHUB_REPOSITORY_OWNER,,}.github.io"

          for attempt in $(seq 1 90); do
            response="$(curl --silent --show-error --connect-timeout 5 --max-time 10 \
              --header 'content-type: application/json' \
              --header "origin: $origin" \
              --data '{"action":"health"}' \
              "$readiness_url" || true)"

            if jq -e '.ok == true and .contract == "prepared-countdown-v1"' <<<"$response" >/dev/null 2>&1; then
              echo "Compatible readiness backend is available at attempt $attempt."
              exit 0
            fi

            echo "Waiting for compatible readiness backend ($attempt/90)…"
            sleep 5
          done

          echo 'The compatible Supabase readiness backend was not available before the Pages deployment deadline.'
          exit 1

      - name: Generate public runtime config
        run: node scripts/generate-config.mjs
        env:
          SUPABASE_FUNCTIONS_URL: ${{ vars.SUPABASE_FUNCTIONS_URL }}
          SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
          TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
          GOOGLE_ANALYTICS_ID: ${{ vars.GOOGLE_ANALYTICS_ID }}
          ADSENSE_CLIENT: ${{ vars.ADSENSE_CLIENT }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
          GITHUB_PAGES_URL: ${{ steps.pages-mode.outputs.site_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

      - name: Render social preview PNG
        run: node scripts/render-social-preview.mjs

      - name: Validate public runtime config
        run: node scripts/validate-runtime-config.mjs
        env:
          SUPABASE_FUNCTIONS_URL: ${{ vars.SUPABASE_FUNCTIONS_URL }}
          SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
          TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
          GOOGLE_ANALYTICS_ID: ${{ vars.GOOGLE_ANALYTICS_ID }}
          ADSENSE_CLIENT: ${{ vars.ADSENSE_CLIENT }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
          GITHUB_PAGES_URL: ${{ steps.pages-mode.outputs.site_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

      - name: Persist generated assets for branch publishing
        if: steps.pages-mode.outputs.build_type == 'legacy'
        shell: bash
        run: |
          set -euo pipefail
          generated=(
            public/config.js
            public/assets/social-preview.png
            public/assets/social-preview-v2.png
            assets/social-preview.png
            assets/social-preview-v2.png
            public/public/assets/social-preview.png
            public/public/assets/social-preview-v2.png
          )
          if [ -z "$(git status --porcelain -- "${generated[@]}")" ]; then
            echo 'The committed public runtime config and social previews are already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- "${generated[@]}"
          git diff --cached --check
          git commit -m 'build(pages): refresh generated public assets [skip ci]'
          git push origin HEAD:main

      - name: Request branch-based Pages build
        if: steps.pages-mode.outputs.build_type == 'legacy'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds"

      - name: Configure workflow-based Pages
        if: steps.pages-mode.outputs.build_type == 'workflow'
        uses: actions/configure-pages@v5

      - name: Upload workflow-based static site
        if: steps.pages-mode.outputs.build_type == 'workflow'
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    name: 🚀 Pages · Deploy artifact
    if: needs.prepare.outputs.build_type == 'workflow'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: prepare
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
