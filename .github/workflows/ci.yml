name: Pull Request Quality Pipeline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]

permissions:
  contents: read

concurrency:
  group: pr-quality-${{ github.event.pull_request.head.repo.full_name }}-${{ github.head_ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22.13.0
  DEPENDENCY_CACHE_VERSION: v1

jobs:
  build:
    name: 🟢 Build · Prepare workspace
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore or create dependency cache
        id: dependency-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
            package-lock.json
          key: ${{ env.DEPENDENCY_CACHE_VERSION }}-npm-${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package.json') }}

      - name: Generate deterministic npm lockfile
        if: steps.dependency-cache.outputs.cache-hit != 'true'
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Install exact dependencies
        if: steps.dependency-cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts --no-audit --no-fund --prefer-offline

      - name: Verify restored dependencies
        if: steps.dependency-cache.outputs.cache-hit == 'true'
        run: npm ls --depth=0

      - name: Generate static application configuration
        run: npm run build:config

      - name: Validate JavaScript syntax
        run: npm run check:syntax

  tests:
    name: 🚧 Tests · Unit & security
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore build dependency cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.npm
            node_modules
            package-lock.json
          key: ${{ env.DEPENDENCY_CACHE_VERSION }}-npm-${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package.json') }}
          fail-on-cache-miss: true

      - name: Run Vitest suite
        id: vitest
        continue-on-error: true
        run: npx vitest run --reporter=default --reporter=json --outputFile=vitest-results.json

      - name: Upload failed test report
        if: steps.vitest.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results-${{ github.run_id }}
          path: vitest-results.json
          retention-days: 7

      - name: Enforce test result
        if: steps.vitest.outcome == 'failure'
        run: |
          cat vitest-results.json
          exit 1

  eslint:
    name: 🧹 ESLint · Static analysis
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore build dependency cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.npm
            node_modules
            package-lock.json
          key: ${{ env.DEPENDENCY_CACHE_VERSION }}-npm-${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package.json') }}
          fail-on-cache-miss: true

      - name: Run ESLint
        id: eslint-check
        continue-on-error: true
        run: npx eslint public scripts tests eslint.config.js --max-warnings=0 --format=json --output-file=eslint-results.json

      - name: Upload failed ESLint report
        if: steps.eslint-check.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: eslint-results-${{ github.run_id }}
          path: eslint-results.json
          retention-days: 7

      - name: Enforce ESLint result
        if: steps.eslint-check.outcome == 'failure'
        run: |
          node -e "const r=require('./eslint-results.json'); for(const f of r.filter(x=>x.errorCount)){console.error(f.filePath); for(const m of f.messages) console.error('  '+m.line+':'+m.column+' '+m.ruleId+' '+m.message)}"
          exit 1

  knip:
    name: 🧩 Knip · Dead code analysis
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore build dependency cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.npm
            node_modules
            package-lock.json
          key: ${{ env.DEPENDENCY_CACHE_VERSION }}-npm-${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package.json') }}
          fail-on-cache-miss: true

      - name: Detect unused files and dependencies
        run: npm run knip

  security:
    name: 🛡️ Security · Dependency & policy checks
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore build dependency cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.npm
            node_modules
            package-lock.json
          key: ${{ env.DEPENDENCY_CACHE_VERSION }}-npm-${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package.json') }}
          fail-on-cache-miss: true

      - name: Audit dependency vulnerabilities
        run: npm audit --audit-level=high

      - name: Reject native browser dialogs
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE --include='*.js' '(^|[^[:alnum:]_$.])(alert|confirm|prompt)[[:space:]]*\(' public; then
            echo 'Native browser dialogs are forbidden. Use window.Minuto106UI.'
            exit 1
          fi

      - name: Reject static finish selectors
        shell: bash
        run: |
          set -euo pipefail
          if grep -InE 'id="stopButton"|#stopButton|<button[^>]*>[^<]*(PARAR|DETENER)' public/index.html public/app.js; then
            echo 'The finish interaction must remain ephemeral and selector-independent.'
            exit 1
          fi
          grep -Fq "attachShadow({ mode: 'closed' })" public/stop-control.js

      - name: Reject secrets in public assets
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE 'SUPABASE_(SERVICE_ROLE|SECRET)_KEY|SUPABASE_ACCESS_TOKEN|SUPABASE_DB_PASSWORD|TURNSTILE_SECRET_KEY|HASH_PEPPER=' public; then
            echo 'A private credential name or value was found in public assets.'
            exit 1
          fi

      - name: Reject dangerous source primitives
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE --exclude-dir=node_modules --exclude='*.test.js' '\beval\s*\(|new Function\s*\(|document\.write\s*\(' public scripts supabase/functions; then
            echo 'A prohibited dynamic execution primitive was found.'
            exit 1
          fi

  supabase-integration:
    name: 🧪 Supabase · Local API integration
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore build dependency cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.npm
            node_modules
            package-lock.json
          key: ${{ env.DEPENDENCY_CACHE_VERSION }}-npm-${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package.json') }}
          fail-on-cache-miss: true

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Create isolated Edge Function environment
        shell: bash
        run: |
          set -euo pipefail
          cat > supabase/functions/.env <<'EOF'
          HASH_PEPPER=ci-local-only-pepper-106-do-not-use-in-production
          ALLOWED_ORIGINS=http://127.0.0.1:3000,http://localhost:3000
          TURNSTILE_SECRET_KEY=
          EOF

      - name: Start local Supabase application stack
        id: supabase_start
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          supabase start \
            -x studio,imgproxy,mailpit,realtime,storage-api,postgres-meta,logflare,vector,supavisor \
            2>&1 | tee supabase-start.log

      - name: Serve game-api in the local Edge Runtime
        if: steps.supabase_start.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          supabase functions serve game-api \
            --env-file supabase/functions/.env \
            > supabase-functions.log 2>&1 &
          echo $! > .supabase-functions.pid

      - name: Run complete API and persistence journey
        id: supabase_api_tests
        if: steps.supabase_start.outcome == 'success'
        continue-on-error: true
        run: npm run test:supabase

      - name: Lint PostgreSQL functions and schema
        id: database_lint
        if: steps.supabase_start.outcome == 'success'
        continue-on-error: true
        run: supabase db lint --level error

      - name: Verify migration history
        id: migration_history
        if: steps.supabase_start.outcome == 'success'
        continue-on-error: true
        run: supabase migration list --local

      - name: Rebuild database entirely from migrations
        id: database_reset
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.supabase_start.outcome }}" != "success" || \
                "${{ steps.supabase_api_tests.outcome }}" != "success" || \
                "${{ steps.database_lint.outcome }}" != "success" || \
                "${{ steps.migration_history.outcome }}" != "success" ]]; then
            echo 'Prerequisite Supabase stages did not succeed.'
            exit 1
          fi
          supabase db reset

      - name: Re-run API smoke checks after database rebuild
        id: post_reset_smoke
        if: always()
        continue-on-error: true
        shell: bash
        env:
          SUPABASE_SMOKE_ONLY: 'true'
        run: |
          set -euo pipefail
          if [[ "${{ steps.database_reset.outcome }}" != "success" ]]; then
            echo 'Database rebuild did not succeed.'
            exit 1
          fi
          npm run test:supabase

      - name: Evaluate local Supabase integration
        id: integration_gate
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          results=(
            "start=${{ steps.supabase_start.outcome }}"
            "api=${{ steps.supabase_api_tests.outcome }}"
            "lint=${{ steps.database_lint.outcome }}"
            "history=${{ steps.migration_history.outcome }}"
            "reset=${{ steps.database_reset.outcome }}"
            "smoke=${{ steps.post_reset_smoke.outcome }}"
          )

          failed=0
          for result in "${results[@]}"; do
            name="${result%%=*}"
            status="${result#*=}"
            printf '%-10s %s\n' "$name" "$status"
            if [[ "$status" != "success" ]]; then
              failed=1
            fi
          done

          if [[ "$failed" -ne 0 ]]; then
            echo 'The local Supabase application did not pass all integration stages.'
            [[ -f supabase-start.log ]] && tail -n 120 supabase-start.log || true
            [[ -f supabase-functions.log ]] && tail -n 160 supabase-functions.log || true
            exit 1
          fi

      - name: Upload failed Supabase diagnostics
        if: steps.integration_gate.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: supabase-local-diagnostics-${{ github.run_id }}
          path: |
            supabase-start.log
            supabase-functions.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop local Supabase services
        if: always()
        shell: bash
        run: |
          if [[ -f .supabase-functions.pid ]]; then
            kill "$(cat .supabase-functions.pid)" 2>/dev/null || true
          fi
          supabase stop --no-backup || true
          rm -f supabase/functions/.env

      - name: Enforce local Supabase integration result
        if: steps.integration_gate.outcome == 'failure'
        run: exit 1

  quality-gate:
    name: ✅ Quality Gate · Ready to merge
    if: always() && github.event.pull_request.draft == false
    needs:
      - build
      - tests
      - eslint
      - knip
      - security
      - supabase-integration
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify all pipeline stages
        shell: bash
        run: |
          set -euo pipefail
          results=(
            "build=${{ needs.build.result }}"
            "tests=${{ needs.tests.result }}"
            "eslint=${{ needs.eslint.result }}"
            "knip=${{ needs.knip.result }}"
            "security=${{ needs.security.result }}"
            "supabase=${{ needs.supabase-integration.result }}"
          )

          failed=0
          for result in "${results[@]}"; do
            name="${result%%=*}"
            status="${result#*=}"
            printf '%-12s %s\n' "$name" "$status"
            if [[ "$status" != "success" ]]; then
              failed=1
            fi
          done

          if [[ "$failed" -ne 0 ]]; then
            echo 'One or more required pipeline stages did not succeed.'
            exit 1
          fi
