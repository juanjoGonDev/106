name: Player Pages and Social Cards

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions: read-all

concurrency:
  group: player-pages-${{ github.event.pull_request.head.repo.full_name }}-${{ github.head_ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22.13.0
  PNPM_VERSION: 11.15.1
  PLAYWRIGHT_VERSION: 1.61.0

jobs:
  coverage:
    name: 🧮 Player modules · 100% coverage
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js and pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install exact dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Enforce player route and flag coverage
        run: pnpm test:player-ui:coverage

      - name: Enforce completed-attempt refresh coverage
        run: pnpm test:attempt-refresh:coverage

  browser:
    name: 🌐 Player pages · Desktop and mobile
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js and pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Validate package policy before installation
        run: pnpm check:package-policy

      - name: Install exact dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Install pinned Chromium runtime
        run: pnpm dlx @playwright/test@${{ env.PLAYWRIGHT_VERSION }} install --with-deps chromium

      - name: Run responsive browser journeys
        run: pnpm test:e2e
