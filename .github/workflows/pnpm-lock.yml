name: Generate pnpm lockfile

on:
  pull_request:
    branches: [main]
    paths:
      - package.json
      - pnpm-workspace.yaml
      - pnpm-lock.yaml
      - .github/workflows/pnpm-lock.yml

permissions:
  contents: read

jobs:
  lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Resolve exact dependency graph without executing package scripts
        run: pnpm install --lockfile-only --no-frozen-lockfile

      - name: Upload generated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-lock-${{ github.run_id }}
          path: pnpm-lock.yaml
          if-no-files-found: error
          retention-days: 1
